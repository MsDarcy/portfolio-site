<svg width="900" height="210" viewBox="0 0 900 210" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#b4b2a9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="900" height="210" fill="#ffffff"/>

  <!-- Raw logs -->
  <rect x="20" y="36" width="160" height="88" rx="4" fill="#f5f4f1" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="100" y="64" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#2c2c2a" text-anchor="middle" dominant-baseline="central">Raw logs</text>
  <text x="100" y="84" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#888780" text-anchor="middle" dominant-baseline="central">server telemetry</text>
  <text x="100" y="104" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#888780" text-anchor="middle" dominant-baseline="central">unstructured</text>
  <line x1="180" y1="80" x2="208" y2="80" stroke="#b4b2a9" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- Normalization -->
  <rect x="208" y="36" width="172" height="88" rx="4" fill="#f5f4f1" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="294" y="64" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#2c2c2a" text-anchor="middle" dominant-baseline="central">Normalization</text>
  <text x="294" y="84" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#888780" text-anchor="middle" dominant-baseline="central">parse · aggregate</text>
  <text x="294" y="104" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#888780" text-anchor="middle" dominant-baseline="central">window · filter</text>
  <line x1="380" y1="80" x2="408" y2="80" stroke="#b4b2a9" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- Structured metrics -->
  <rect x="408" y="36" width="172" height="88" rx="4" fill="#f5f4f1" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="494" y="64" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#2c2c2a" text-anchor="middle" dominant-baseline="central">Structured metrics</text>
  <text x="494" y="84" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#888780" text-anchor="middle" dominant-baseline="central">error rate · latency</text>
  <text x="494" y="104" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#888780" text-anchor="middle" dominant-baseline="central">traffic volume</text>
  <line x1="580" y1="80" x2="608" y2="80" stroke="#b4b2a9" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- Dashboard: accent -->
  <rect x="608" y="36" width="272" height="88" rx="4" fill="#e6f1fb" stroke="#378add" stroke-width="0.5"/>
  <text x="744" y="64" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#0c447c" text-anchor="middle" dominant-baseline="central">Dashboard</text>
  <text x="744" y="84" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#185fa5" text-anchor="middle" dominant-baseline="central">PM-readable</text>
  <text x="744" y="104" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#185fa5" text-anchor="middle" dominant-baseline="central">self-service</text>

  <!-- Scope brackets -->
  <rect x="20" y="142" width="560" height="18" rx="3" fill="none" stroke="#d3d1c7" stroke-width="0.5" stroke-dasharray="3 3"/>
  <text x="300" y="151" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#b4b2a9" text-anchor="middle" dominant-baseline="central">engineering scope</text>

  <rect x="608" y="142" width="272" height="18" rx="3" fill="none" stroke="#378add" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.5"/>
  <text x="744" y="151" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#185fa5" text-anchor="middle" dominant-baseline="central">product scope</text>

  <!-- Caption -->
  <text x="20" y="190" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#888780">Translated technical telemetry into accessible product insight.</text>
</svg>
