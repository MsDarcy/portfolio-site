<svg width="900" height="480" viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="480" fill="#ffffff"/>

  <!-- Dashboard chrome -->
  <rect x="20" y="20" width="860" height="330" rx="6" fill="#ffffff" stroke="#d3d1c7" stroke-width="0.5"/>

  <!-- Header bar -->
  <rect x="20" y="20" width="860" height="40" rx="6" fill="#f5f4f1"/>
  <rect x="20" y="44" width="860" height="16" fill="#f5f4f1"/>
  <line x1="20" y1="60" x2="880" y2="60" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="36" y="44" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#2c2c2a" dominant-baseline="central">API performance</text>
  <rect x="722" y="30" width="68" height="20" rx="3" fill="#ffffff" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="756" y="40" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#888780" text-anchor="middle" dominant-baseline="central">Last 7 days</text>
  <rect x="798" y="30" width="68" height="20" rx="3" fill="#ffffff" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="832" y="40" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#888780" text-anchor="middle" dominant-baseline="central">All endpoints</text>

  <!-- Metric cards -->
  <!-- Error rate: accented -->
  <rect x="36" y="74" width="254" height="68" rx="4" fill="#f5f4f1" stroke="#378add" stroke-width="0.5"/>
  <text x="52" y="92" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#888780">Error rate</text>
  <text x="52" y="120" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="500" fill="#2c2c2a">0.4%</text>
  <text x="52" y="136" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#378add">↑ 0.1% from prior week</text>

  <!-- p95 latency -->
  <rect x="302" y="74" width="254" height="68" rx="4" fill="#f5f4f1" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="318" y="92" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#888780">p95 latency</text>
  <text x="318" y="120" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="500" fill="#2c2c2a">284ms</text>
  <text x="318" y="136" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5f5e5a">↓ 12ms from prior week</text>

  <!-- Total requests -->
  <rect x="568" y="74" width="292" height="68" rx="4" fill="#f5f4f1" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="584" y="92" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#888780">Total requests</text>
  <text x="584" y="120" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="500" fill="#2c2c2a">1.8M</text>
  <text x="584" y="136" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5f5e5a">↑ 6% from prior week</text>

  <!-- Error rate chart -->
  <rect x="36" y="156" width="570" height="172" rx="4" fill="#f5f4f1" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="52" y="174" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#888780">Error rate — daily</text>

  <!-- Bars -->
  <rect x="68"  y="272" width="48" height="24"  rx="2" fill="#d3d1c7"/>
  <text x="92"  y="304" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#888780" text-anchor="middle">M</text>
  <rect x="140" y="262" width="48" height="34"  rx="2" fill="#d3d1c7"/>
  <text x="164" y="304" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#888780" text-anchor="middle">T</text>
  <rect x="212" y="267" width="48" height="29"  rx="2" fill="#d3d1c7"/>
  <text x="236" y="304" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#888780" text-anchor="middle">W</text>
  <rect x="284" y="256" width="48" height="40"  rx="2" fill="#d3d1c7"/>
  <text x="308" y="304" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#888780" text-anchor="middle">T</text>
  <rect x="356" y="192" width="48" height="104" rx="2" fill="#378add"/>
  <text x="380" y="304" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#378add" text-anchor="middle">F</text>
  <rect x="428" y="248" width="48" height="48"  rx="2" fill="#d3d1c7"/>
  <text x="452" y="304" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#888780" text-anchor="middle">S</text>
  <rect x="500" y="274" width="48" height="22"  rx="2" fill="#d3d1c7"/>
  <text x="524" y="304" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#888780" text-anchor="middle">S</text>

  <!-- Legend -->
  <rect x="52" y="316" width="8" height="8" rx="1" fill="#378add"/>
  <text x="66" y="320" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#888780" dominant-baseline="central">Friday spike — 2.1% · above threshold</text>

  <!-- By endpoint panel -->
  <rect x="620" y="156" width="240" height="172" rx="4" fill="#f5f4f1" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="636" y="174" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#888780">By endpoint</text>

  <!-- POST /messages -->
  <text x="636" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5f5e5a">POST /messages</text>
  <text x="844" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="500" fill="#2c2c2a" text-anchor="end">0.8%</text>
  <rect x="636" y="206" width="208" height="4" rx="2" fill="#e8e6de"/>
  <rect x="636" y="206" width="166" height="4" rx="2" fill="#378add"/>

  <!-- GET /models -->
  <text x="636" y="230" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5f5e5a">GET /models</text>
  <text x="844" y="230" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="500" fill="#2c2c2a" text-anchor="end">0.1%</text>
  <rect x="636" y="236" width="208" height="4" rx="2" fill="#e8e6de"/>
  <rect x="636" y="236" width="21" height="4" rx="2" fill="#d3d1c7"/>

  <!-- GET /usage -->
  <text x="636" y="260" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5f5e5a">GET /usage</text>
  <text x="844" y="260" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="500" fill="#2c2c2a" text-anchor="end">0.2%</text>
  <rect x="636" y="266" width="208" height="4" rx="2" fill="#e8e6de"/>
  <rect x="636" y="266" width="42" height="4" rx="2" fill="#d3d1c7"/>

  <!-- Annotation callouts -->
  <circle cx="36" cy="368" r="4" fill="none" stroke="#378add" stroke-width="0.5"/>
  <text x="48" y="368" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#888780" dominant-baseline="central">Primary metric highlighted — error rate given visual priority via border accent</text>

  <circle cx="36" cy="392" r="4" fill="none" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="48" y="392" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#888780" dominant-baseline="central">Anomaly marked in-chart — Friday spike surfaced without requiring drill-down</text>

  <circle cx="36" cy="416" r="4" fill="none" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="48" y="416" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#888780" dominant-baseline="central">Endpoint breakdown contextualizes aggregate — directs eng handoff when needed</text>

  <!-- Caption -->
  <text x="20" y="456" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#888780">Designed dashboards supporting rapid decision-making.</text>
</svg>
