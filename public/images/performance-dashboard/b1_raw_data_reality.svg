<svg width="900" height="240" viewBox="0 0 900 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#b4b2a9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="900" height="240" fill="#ffffff"/>

  <!-- Server logs -->
  <rect x="28" y="28" width="180" height="108" rx="4" fill="#f5f4f1" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="118" y="52" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#2c2c2a" text-anchor="middle" dominant-baseline="central">Server logs</text>
  <line x1="44" y1="66" x2="192" y2="66" stroke="#d3d1c7" stroke-width="0.5" opacity="0.6"/>
  <text x="118" y="84" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#888780" text-anchor="middle" dominant-baseline="central">200 GET /v1/msg 12ms</text>
  <text x="118" y="102" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#888780" text-anchor="middle" dominant-baseline="central">500 POST /v1/msg 8s</text>
  <text x="118" y="120" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#888780" text-anchor="middle" dominant-baseline="central">200 GET /v1/msg 9ms</text>

  <line x1="208" y1="82" x2="234" y2="82" stroke="#b4b2a9" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- Raw metrics -->
  <rect x="234" y="28" width="180" height="108" rx="4" fill="#f5f4f1" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="324" y="52" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#2c2c2a" text-anchor="middle" dominant-baseline="central">Raw metrics</text>
  <line x1="250" y1="66" x2="398" y2="66" stroke="#d3d1c7" stroke-width="0.5" opacity="0.6"/>
  <text x="324" y="84" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#888780" text-anchor="middle" dominant-baseline="central">p50: 11ms p95: 4.2s</text>
  <text x="324" y="102" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#888780" text-anchor="middle" dominant-baseline="central">err: 0.034 rps: 1841</text>
  <text x="324" y="120" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#888780" text-anchor="middle" dominant-baseline="central">region: us-east-1</text>

  <line x1="414" y1="82" x2="440" y2="82" stroke="#b4b2a9" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- Product team: accent -->
  <rect x="440" y="28" width="432" height="108" rx="4" fill="#e6f1fb" stroke="#378add" stroke-width="0.5"/>
  <text x="656" y="52" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#0c447c" text-anchor="middle" dominant-baseline="central">Product team experience</text>
  <line x1="458" y1="66" x2="854" y2="66" stroke="#378add" stroke-width="0.5" opacity="0.4"/>
  <text x="656" y="84" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#185fa5" text-anchor="middle" dominant-baseline="central">no dashboard · no context</text>
  <text x="656" y="102" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#185fa5" text-anchor="middle" dominant-baseline="central">eng request required to get answers</text>
  <text x="656" y="120" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#185fa5" text-anchor="middle" dominant-baseline="central">decisions delayed or skipped</text>

  <!-- Scope labels -->
  <line x1="28" y1="154" x2="872" y2="154" stroke="#d3d1c7" stroke-width="0.5" opacity="0.4"/>
  <text x="118" y="172" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#b4b2a9" text-anchor="middle">generated continuously</text>
  <text x="324" y="172" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#b4b2a9" text-anchor="middle">not normalized</text>
  <text x="656" y="172" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#b4b2a9" text-anchor="middle">no self-service path</text>

  <!-- Caption -->
  <text x="28" y="210" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#888780">Product teams lacked accessible visibility into API performance.</text>
</svg>
