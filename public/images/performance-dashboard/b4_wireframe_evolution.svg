<svg width="900" height="380" viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="380" fill="#ffffff"/>

  <!-- Panel 1: v1 lo-fi -->
  <rect x="20" y="20" width="415" height="320" rx="6" fill="#ffffff" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="36" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="500" fill="#5f5e5a">v1 — initial layout</text>
  <text x="420" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#888780" text-anchor="end">lo-fi</text>
  <line x1="20" y1="56" x2="435" y2="56" stroke="#d3d1c7" stroke-width="0.5"/>

  <!-- 3 equal metric placeholders -->
  <rect x="36" y="70" width="118" height="40" rx="3" fill="#f5f4f1" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="95" y="90" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#b4b2a9" text-anchor="middle" dominant-baseline="central">metric</text>
  <rect x="164" y="70" width="118" height="40" rx="3" fill="#f5f4f1" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="223" y="90" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#b4b2a9" text-anchor="middle" dominant-baseline="central">metric</text>
  <rect x="292" y="70" width="118" height="40" rx="3" fill="#f5f4f1" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="351" y="90" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#b4b2a9" text-anchor="middle" dominant-baseline="central">metric</text>

  <!-- Chart areas -->
  <rect x="36" y="120" width="374" height="58" rx="3" fill="#f5f4f1" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="223" y="149" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#b4b2a9" text-anchor="middle" dominant-baseline="central">chart area</text>
  <rect x="36" y="186" width="374" height="58" rx="3" fill="#f5f4f1" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="223" y="215" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#b4b2a9" text-anchor="middle" dominant-baseline="central">chart area</text>
  <rect x="36" y="252" width="374" height="42" rx="3" fill="#f5f4f1" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="223" y="273" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#b4b2a9" text-anchor="middle" dominant-baseline="central">table</text>

  <!-- Callout -->
  <rect x="36" y="306" width="3" height="22" fill="#d3d1c7"/>
  <text x="46" y="317" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#888780" dominant-baseline="central">all signal types equal weight — no hierarchy</text>

  <!-- Panel 2: v3 refined -->
  <rect x="465" y="20" width="415" height="320" rx="6" fill="#ffffff" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="481" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="500" fill="#5f5e5a">v3 — refined layout</text>
  <text x="865" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#378add" text-anchor="end">final direction</text>
  <line x1="465" y1="56" x2="880" y2="56" stroke="#d3d1c7" stroke-width="0.5"/>

  <!-- Metric cards with hierarchy — error rate accented -->
  <rect x="481" y="70" width="118" height="48" rx="3" fill="#f5f4f1" stroke="#378add" stroke-width="0.5"/>
  <text x="491" y="86" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#888780">Error rate</text>
  <text x="491" y="106" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="500" fill="#2c2c2a">0.4%</text>

  <rect x="609" y="70" width="118" height="48" rx="3" fill="#f5f4f1" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="619" y="86" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#888780">p95 latency</text>
  <text x="619" y="106" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="500" fill="#2c2c2a">284ms</text>

  <rect x="737" y="70" width="118" height="48" rx="3" fill="#f5f4f1" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="747" y="86" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#888780">Requests</text>
  <text x="747" y="106" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="500" fill="#2c2c2a">1.8M</text>

  <!-- Bar chart with spike -->
  <rect x="481" y="128" width="374" height="74" rx="3" fill="#f5f4f1" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="491" y="143" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#888780">Error rate — 7 days</text>

  <!-- Bars: M T W T F S S -->
  <rect x="499" y="183" width="28" height="8" rx="1" fill="#d3d1c7"/>
  <text x="513" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#888780" text-anchor="middle">M</text>
  <rect x="537" y="178" width="28" height="13" rx="1" fill="#d3d1c7"/>
  <text x="551" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#888780" text-anchor="middle">T</text>
  <rect x="575" y="181" width="28" height="10" rx="1" fill="#d3d1c7"/>
  <text x="589" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#888780" text-anchor="middle">W</text>
  <rect x="613" y="175" width="28" height="16" rx="1" fill="#d3d1c7"/>
  <text x="627" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#888780" text-anchor="middle">T</text>
  <rect x="651" y="152" width="28" height="39" rx="1" fill="#378add"/>
  <text x="665" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#378add" text-anchor="middle">F</text>
  <rect x="689" y="173" width="28" height="18" rx="1" fill="#d3d1c7"/>
  <text x="703" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#888780" text-anchor="middle">S</text>
  <rect x="727" y="184" width="28" height="7" rx="1" fill="#d3d1c7"/>
  <text x="741" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#888780" text-anchor="middle">S</text>

  <!-- Callout -->
  <rect x="481" y="214" width="3" height="32" fill="#378add"/>
  <text x="491" y="228" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#2c2c2a" dominant-baseline="central">primary signal prominent</text>
  <text x="491" y="244" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#888780" dominant-baseline="central">anomalies visible at a glance</text>

  <!-- Caption -->
  <text x="20" y="360" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#888780">Iterated toward scanability and signal clarity.</text>
</svg>
