<svg width="900" height="310" viewBox="0 0 900 310" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#b4b2a9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="900" height="310" fill="#ffffff"/>

  <!-- Trigger -->
  <rect x="300" y="28" width="300" height="48" rx="4" fill="#f5f4f1" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="450" y="48" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#2c2c2a" text-anchor="middle" dominant-baseline="central">Admin leaves org</text>
  <text x="450" y="66" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#888780" text-anchor="middle" dominant-baseline="central">removal or account deactivation</text>

  <line x1="450" y1="76" x2="450" y2="104" stroke="#b4b2a9" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- Check -->
  <rect x="300" y="104" width="300" height="48" rx="4" fill="#f5f4f1" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="450" y="124" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#2c2c2a" text-anchor="middle" dominant-baseline="central">System checks admin count</text>
  <text x="450" y="142" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#888780" text-anchor="middle" dominant-baseline="central">remaining admins ≥ 2?</text>

  <!-- Branch arrows -->
  <line x1="360" y1="152" x2="200" y2="188" stroke="#b4b2a9" stroke-width="0.5" marker-end="url(#arrow)"/>
  <text x="262" y="174" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#888780" text-anchor="middle">yes</text>

  <line x1="540" y1="152" x2="700" y2="188" stroke="#b4b2a9" stroke-width="0.5" marker-end="url(#arrow)"/>
  <text x="638" y="174" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#888780" text-anchor="middle">no</text>

  <!-- Yes path: neutral -->
  <rect x="100" y="188" width="200" height="52" rx="4" fill="#f5f4f1" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="200" y="208" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#2c2c2a" text-anchor="middle" dominant-baseline="central">Removal proceeds</text>
  <text x="200" y="226" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#888780" text-anchor="middle" dominant-baseline="central">governance intact</text>

  <!-- No path: accent -->
  <rect x="600" y="188" width="200" height="52" rx="4" fill="#e6f1fb" stroke="#378add" stroke-width="0.5"/>
  <text x="700" y="208" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#0c447c" text-anchor="middle" dominant-baseline="central">Removal blocked</text>
  <text x="700" y="226" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#185fa5" text-anchor="middle" dominant-baseline="central">prompt to assign new admin</text>

  <line x1="700" y1="240" x2="700" y2="264" stroke="#b4b2a9" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- Outcome -->
  <rect x="540" y="264" width="320" height="28" rx="4" fill="#f5f4f1" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="700" y="278" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#5f5e5a" text-anchor="middle" dominant-baseline="central">Org never left without admin coverage</text>

  <!-- Caption -->
  <text x="28" y="302" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#888780">Two-admin safeguard prevents orphaned environments.</text>
</svg>
