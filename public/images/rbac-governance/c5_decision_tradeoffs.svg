<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="200" fill="#ffffff"/>

  <!-- Left card: neutral -->
  <rect x="20" y="20" width="410" height="132" rx="4" fill="#f5f4f1" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="225" y="54" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#2c2c2a" text-anchor="middle" dominant-baseline="central">Simplicity vs. flexibility</text>
  <line x1="36" y1="68" x2="414" y2="68" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="225" y="96" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#5f5e5a" text-anchor="middle" dominant-baseline="central">3 fixed roles · no custom role builder</text>
  <text x="225" y="118" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#5f5e5a" text-anchor="middle" dominant-baseline="central">covers 95% of enterprise use cases</text>

  <!-- Right card: accent -->
  <rect x="470" y="20" width="410" height="132" rx="4" fill="#e6f1fb" stroke="#378add" stroke-width="0.5"/>
  <text x="675" y="54" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#0c447c" text-anchor="middle" dominant-baseline="central">Security vs. autonomy</text>
  <line x1="486" y1="68" x2="864" y2="68" stroke="#378add" stroke-width="0.5" opacity="0.4"/>
  <text x="675" y="96" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#185fa5" text-anchor="middle" dominant-baseline="central">min. 2 admins enforced by system</text>
  <text x="675" y="118" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#185fa5" text-anchor="middle" dominant-baseline="central">owner retains override capability</text>

  <!-- Caption -->
  <text x="20" y="178" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#888780">Balanced enterprise governance requirements with usability.</text>
</svg>
