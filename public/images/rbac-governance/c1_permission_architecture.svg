<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#b4b2a9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="900" height="300" fill="#ffffff"/>

  <!-- Organization -->
  <rect x="350" y="28" width="200" height="40" rx="4" fill="#f5f4f1" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="450" y="48" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#2c2c2a" text-anchor="middle" dominant-baseline="central">Organization</text>

  <line x1="450" y1="68" x2="450" y2="92" stroke="#b4b2a9" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- Roles: accent -->
  <rect x="350" y="92" width="200" height="40" rx="4" fill="#e6f1fb" stroke="#378add" stroke-width="0.5"/>
  <text x="450" y="112" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#0c447c" text-anchor="middle" dominant-baseline="central">Roles</text>

  <!-- Fan out arrows -->
  <line x1="390" y1="132" x2="170" y2="176" stroke="#b4b2a9" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="132" x2="450" y2="176" stroke="#b4b2a9" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="510" y1="132" x2="730" y2="176" stroke="#b4b2a9" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- Role boxes -->
  <rect x="80" y="176" width="180" height="52" rx="4" fill="#f5f4f1" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="170" y="196" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#2c2c2a" text-anchor="middle" dominant-baseline="central">Owner</text>
  <text x="170" y="214" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#888780" text-anchor="middle" dominant-baseline="central">full control</text>

  <rect x="360" y="176" width="180" height="52" rx="4" fill="#f5f4f1" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="450" y="196" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#2c2c2a" text-anchor="middle" dominant-baseline="central">Admin</text>
  <text x="450" y="214" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#888780" text-anchor="middle" dominant-baseline="central">manage members</text>

  <rect x="640" y="176" width="180" height="52" rx="4" fill="#f5f4f1" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="730" y="196" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#2c2c2a" text-anchor="middle" dominant-baseline="central">Developer</text>
  <text x="730" y="214" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#888780" text-anchor="middle" dominant-baseline="central">scoped access</text>

  <!-- Down to Users -->
  <line x1="170" y1="228" x2="170" y2="248" stroke="#b4b2a9" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="228" x2="450" y2="248" stroke="#b4b2a9" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="730" y1="228" x2="730" y2="248" stroke="#b4b2a9" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- User boxes -->
  <rect x="80" y="248" width="180" height="28" rx="4" fill="#f5f4f1" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="170" y="262" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#5f5e5a" text-anchor="middle" dominant-baseline="central">Users</text>

  <rect x="360" y="248" width="180" height="28" rx="4" fill="#f5f4f1" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="450" y="262" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#5f5e5a" text-anchor="middle" dominant-baseline="central">Users</text>

  <rect x="640" y="248" width="180" height="28" rx="4" fill="#f5f4f1" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="730" y="262" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#5f5e5a" text-anchor="middle" dominant-baseline="central">Users</text>

  <!-- Caption -->
  <text x="28" y="292" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#888780">Defined relationships between users, roles, and organizational ownership.</text>
</svg>
