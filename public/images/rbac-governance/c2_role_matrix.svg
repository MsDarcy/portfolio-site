<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="260" fill="#ffffff"/>

  <!-- Header -->
  <text x="28" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#888780">Role</text>
  <text x="164" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#888780">Permissions</text>
  <text x="544" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#888780">Rationale</text>
  <line x1="28" y1="42" x2="872" y2="42" stroke="#2c2c2a" stroke-width="0.5"/>

  <!-- Row 1: Owner -->
  <rect x="0" y="43" width="900" height="58" fill="#ffffff"/>
  <text x="28" y="75" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#2c2c2a" dominant-baseline="central">Owner</text>
  <text x="164" y="68" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#5f5e5a" dominant-baseline="auto">Manage billing, transfer ownership,</text>
  <text x="164" y="86" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#5f5e5a" dominant-baseline="auto">delete org, assign all roles</text>
  <text x="544" y="68" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#5f5e5a" dominant-baseline="auto">Single accountable party per org;</text>
  <text x="544" y="86" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#5f5e5a" dominant-baseline="auto">non-delegatable actions scoped here</text>
  <line x1="28" y1="101" x2="872" y2="101" stroke="#d3d1c7" stroke-width="0.5"/>

  <!-- Row 2: Admin (alt) -->
  <rect x="0" y="102" width="900" height="58" fill="#f9f8f6"/>
  <text x="28" y="134" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#2c2c2a" dominant-baseline="central">Admin</text>
  <text x="164" y="127" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#5f5e5a" dominant-baseline="auto">Invite / remove members, assign</text>
  <text x="164" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#5f5e5a" dominant-baseline="auto">Developer role, manage workspaces</text>
  <text x="544" y="127" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#5f5e5a" dominant-baseline="auto">Operational control without financial</text>
  <text x="544" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#5f5e5a" dominant-baseline="auto">exposure; min. 2 required per org</text>
  <line x1="28" y1="160" x2="872" y2="160" stroke="#d3d1c7" stroke-width="0.5"/>

  <!-- Row 3: Developer -->
  <rect x="0" y="161" width="900" height="58" fill="#ffffff"/>
  <text x="28" y="193" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#2c2c2a" dominant-baseline="central">Developer</text>
  <text x="164" y="186" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#5f5e5a" dominant-baseline="auto">API access, build and test,</text>
  <text x="164" y="204" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#5f5e5a" dominant-baseline="auto">read workspace config</text>
  <text x="544" y="186" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#5f5e5a" dominant-baseline="auto">Least-privilege default; no member</text>
  <text x="544" y="204" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#5f5e5a" dominant-baseline="auto">management or billing visibility</text>

  <!-- Caption -->
  <text x="28" y="242" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#888780">Role definitions balanced flexibility with least-privilege principles.</text>
</svg>
