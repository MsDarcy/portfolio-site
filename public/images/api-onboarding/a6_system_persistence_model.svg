  <line x1="472" y1="72" x2="516" y2="58" stroke="#b4b2a9" stroke-width="0.5" marker-end="url(#arrow-dash)" stroke-dasharray="3 2"/>
  <line x1="472" y1="104" x2="516" y2="104" stroke="#b4b2a9" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="472" y1="136" x2="516" y2="150" stroke="#b4b2a9" stroke-width="0.5" marker-end="url(#arrow-dash)" stroke-dasharray="3 2"/>

