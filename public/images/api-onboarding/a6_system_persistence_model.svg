  <rect x="516" y="36" width="172" height="44" rx="4" fill="#f5f4f1" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="602" y="58" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="500" fill="#2c2c2a" text-anchor="middle" dominant-baseline="central">Config stage</text>

