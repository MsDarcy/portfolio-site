<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#b4b2a9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="900" height="260" fill="#ffffff"/>

  <!-- Tier 1 -->
  <rect x="60" y="28" width="780" height="72" rx="4" fill="#f5f4f1" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="300" y="56" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#2c2c2a" text-anchor="middle" dominant-baseline="central">Tier 1 — fast-track intake</text>
  <text x="300" y="76" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#888780" text-anchor="middle" dominant-baseline="central">11 questions · business context only</text>
  <text x="740" y="56" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#888780" text-anchor="middle" dominant-baseline="central">~10 min</text>
  <text x="740" y="76" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#888780" text-anchor="middle" dominant-baseline="central">low friction</text>

  <!-- Arrow -->
  <line x1="450" y1="100" x2="450" y2="128" stroke="#b4b2a9" stroke-width="0.5" marker-end="url(#arrow)"/>
  <text x="480" y="116" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#888780" dominant-baseline="central">on readiness</text>

  <!-- Tier 2 -->
  <rect x="60" y="128" width="780" height="72" rx="4" fill="#e6f1fb" stroke="#378add" stroke-width="0.5"/>
  <text x="300" y="156" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#0c447c" text-anchor="middle" dominant-baseline="central">Tier 2 — technical intake</text>
  <text x="300" y="176" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#185fa5" text-anchor="middle" dominant-baseline="central">auth · data schema · API · compliance</text>
  <text x="740" y="156" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#185fa5" text-anchor="middle" dominant-baseline="central">phased</text>
  <text x="740" y="176" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#185fa5" text-anchor="middle" dominant-baseline="central">high rigor</text>

  <!-- Caption -->
  <text x="60" y="228" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#888780">Two-tier structure reduces early friction while preserving technical rigor.</text>
</svg>
